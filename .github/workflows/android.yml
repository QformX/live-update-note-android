name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create releases and upload assets

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup JDK 17 and enable built-in Gradle caching
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. Grant execute permission for Gradle wrapper
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Upload APK to GitHub Actions Build Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-update-note-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      # 6. Create automatic GitHub Draft Release on Main Branch Push
      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }} (Draft)"
          body: |
            Automatic CI/CD Build from push to main.
            
            Find the compiled APK attached below.
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
